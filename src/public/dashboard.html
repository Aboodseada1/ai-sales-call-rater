<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - AI Sales Call Rater</title>
  <meta name="description" content="Admin dashboard for RateFlow voice assessment platform. View ratings, statistics, and manage candidate evaluations.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%232563eb' rx='6' width='32' height='32'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='Inter,sans-serif' font-weight='800' font-size='12'>RF</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-pattern"></div>
  
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="brand">
        <div class="brand-icon">RF</div>
        <div class="brand-text">
          <span class="brand-name">AI Sales Call Rater</span>
          <span class="brand-tagline">Operations Console</span>
        </div>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Assess
        </a>
        <a href="/docs" class="nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>
          API Docs
        </a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-badge">
        <span class="hero-badge-dot"></span>
        Admin Performance Center
      </div>
      <h1 class="hero-title">
        Track ratings, <span class="hero-title-highlight">quality trends</span>, and candidate outcomes
      </h1>
    </section>

    <!-- Stats Grid -->
    <section class="stats-grid" id="statsContainer">
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">Loading...</div>
      </div>
    </section>

    <!-- Ratings Table -->
    <section class="table-card">
      <div class="table-header">
        <h2 class="table-title">Recent Ratings</h2>
        <input id="searchInput" class="input" type="search" placeholder="Search by recommendation or score...">
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Date</th>
              <th>Score</th>
              <th>Recommendation</th>
              <th>Audio</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="ratingsTableBody">
            <tr>
              <td colspan="6" class="empty-state">Loading ratings...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
